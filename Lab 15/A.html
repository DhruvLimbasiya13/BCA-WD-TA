<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registration Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-6">

                <!-- <div class="card mt-5 shadow-sm">
                    <div class="card-body"> -->

                        <h4 class="text-center mb-4">Registration Form</h4>

                        <form>

                            <div class="row mb-3">
                                <label class="col-4 col-form-label">First Name</label>
                                <div class="col-8">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                                        <input type="text" class="form-control" placeholder="First Name">
                                    </div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-4 col-form-label">Last Name</label>
                                <div class="col-8">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                                        <input type="text" class="form-control" placeholder="Last Name">
                                    </div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-4 col-form-label">Department / Office</label>
                                <div class="col-8">
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="bi bi-list-task"></i>
                                        </span>
                                        <select class="form-select">
                                            <option hidden>Select your Department/Office</option>
                                            <option>HR</option>
                                            <option>IT</option>
                                            <option>Finance</option>
                                            <option>Marketing</option>
                                        </select>
                                    </div>
                                </div>
                            </div>


                            <div class="row mb-3">
                                <label class="col-4 col-form-label">Username</label>
                                <div class="col-8">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-person-circle"></i></span>
                                        <input type="text" class="form-control" placeholder="Username">
                                    </div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-4 col-form-label">Password</label>
                                <div class="col-8">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                        <input type="password" class="form-control" placeholder="Password">
                                    </div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-4 col-form-label">Confirm Password</label>
                                <div class="col-8">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                        <input type="password" class="form-control" placeholder="Confirm Password">
                                    </div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-4 col-form-label">E-Mail</label>
                                <div class="col-8">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                        <input type="email" class="form-control" placeholder="E-Mail Address">
                                    </div>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <label class="col-4 col-form-label">Contact No.</label>
                                <div class="col-8">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                        <input type="text" class="form-control" placeholder="(+91)">
                                    </div>
                                </div>
                            </div>

                            <div class="text-center">
                                <button class="btn btn-warning px-5 text-white">
                                    SUBMIT
                                    <i class="bi bi-send"></i>
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            <!-- </div>
        </div> -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
