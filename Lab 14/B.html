<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Student Registration</h2>

    <div class="row justify-content-center">
        <div class="col-md-8">

            <form>

                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Full Name</label>
                    <div class="col-sm-8">
                        <input type="text" class="form-control" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Email</label>
                    <div class="col-sm-8">
                        <input type="email" class="form-control">
                    </div>
                </div>

                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Mobile Number</label>
                    <div class="col-sm-8">
                        <input type="tel" class="form-control" pattern="[0-9]{10}">
                    </div>
                </div>

                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Address</label>
                    <div class="col-sm-8">
                        <textarea class="form-control" rows="3"></textarea>
                    </div>
                </div>

                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Nationality</label>
                    <div class="col-sm-8">
                        <input type="text" class="form-control">
                    </div>
                </div>

                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Date of Birth</label>
                    <div class="col-sm-8">
                        <input type="date" class="form-control">
                    </div>
                </div>

                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Gender</label>
                    <div class="col-sm-8 pt-2">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender">
                            <label class="form-check-label">Male</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender">
                            <label class="form-check-label">Female</label>
                        </div>
                    </div>
                </div>

                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Highest Degree</label>
                    <div class="col-sm-8">
                        <select class="form-select">
                            <option hidden>Highest Degree</option>
                            <option>High School</option>
                            <option>Bachelor's</option>
                            <option>Master's</option>
                            <option>PhD</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">CPI</label>
                    <div class="col-sm-8">
                        <input type="number" class="form-control" step="0.01" min="0" max="10">
                    </div>
                </div>

                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">University</label>
                    <div class="col-sm-8">
                        <input type="text" class="form-control">
                    </div>
                </div>

                <div class="row mb-4">
                    <label class="col-sm-4 col-form-label">Passing Year</label>
                    <div class="col-sm-8">
                        <select class="form-select" >
                            <option hidden>Passing Year</option>
                            <option>2024</option>
                            <option>2025</option>
                            <option>2026</option>
                            <option>2027</option>
                            <option>2028</option>
                        </select>
                    </div>
                </div>

                <div class="text-center">
                    <button class="btn btn-primary px-4">Submit</button>
                    <button type="reset" class="btn btn-secondary px-4 ms-2">Cancel</button>
                </div>

            </form>

        </div>
    </div>
</div>

</body>
</html>
