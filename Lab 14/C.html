<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">
    <h2 class="text-center mb-4">Employee Registration</h2>

    <form>

        <h4 class="text-center mb-3">Personal Information</h4>

        <div class="row mb-3">
            <label class="col-md-2 col-form-label">Employee Id</label>
            <div class="col-md-4">
                <input type="text" class="form-control" placeholder="Enter Employee Id">
            </div>

            <label class="col-md-2 col-form-label">Employee Name</label>
            <div class="col-md-4">
                <input type="text" class="form-control" placeholder="Enter Employee Name">
            </div>
        </div>

        <div class="row mb-3">
            <label class="col-md-2 col-form-label">Email</label>
            <div class="col-md-4">
                <input type="email" class="form-control" placeholder="Enter Email">
            </div>

            <label class="col-md-2 col-form-label">Contact No</label>
            <div class="col-md-4">
                <input type="tel" class="form-control" placeholder="Enter Contact No">
            </div>
        </div>

        <div class="row mb-4">
            <label class="col-md-2 col-form-label">Marital Status</label>
            <div class="col-md-10 pt-2">
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="status">
                    <label class="form-check-label">Single</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="status">
                    <label class="form-check-label">Married</label>
                </div>
            </div>
        </div>

        <h4 class="text-center mb-3">Education Qualification</h4>

        <div class="row mb-4">
            <label class="col-md-2 col-form-label">Education</label>
            <div class="col-md-4">
                <input type="text" class="form-control" placeholder="Enter Education Details">
            </div>

            <label class="col-md-2 col-form-label">Experience</label>
            <div class="col-md-4">
                <input type="text" class="form-control" placeholder="Enter Experience Details">
            </div>
        </div>

        <h4 class="text-center mb-3">Job Details</h4>

        <div class="row mb-3">
            <label class="col-md-2 col-form-label">Designation</label>
            <div class="col-md-4">
                <input type="text" class="form-control" placeholder="Enter Designation">
            </div>

            <label class="col-md-2 col-form-label">Job Location</label>
            <div class="col-md-4">
                <input type="text" class="form-control" placeholder="Enter Job Location">
            </div>
        </div>

        <div class="row mb-4">
            <label class="col-md-2 col-form-label">Salary</label>
            <div class="col-md-10">
                <input type="text" class="form-control" placeholder="Enter Salary Details">
            </div>
        </div>

        <hr class="my-4">

        <div class="text-center">
            <button type="submit" class="btn btn-primary px-5">Register</button>
        </div>

    </form>
</div>

</body>
</html>
