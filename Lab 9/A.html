<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Simple Hero Layout</title>
    <link rel="stylesheet" href="A_1.css" />
</head>

<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="brand">
                <img class="logo" src="darshan_logo.png" alt="Darshan University logo">
            </div>

            <nav class="top-nav">
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Services</a>
                <a href="#">My Work</a>
                <a href="#">Contact</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <img class="hero-img" src="hero.jpg" alt="hero image">
        <div class="hero-overlay">
            <h1 class="hero-title">Hello, I am Web Developer</h1>
            <p class="hero-sub">
                I use HTML and CSS to convert webpage designs into beautiful and efficient websites.
            </p>
        </div>
    </section>

    <section class="programs">
        <div class="program-card">
            <h3>Program 1</h3>
        </div>
        <div class="program-card">
            <h3>Program 2</h3>
        </div>
        <div class="program-card">
            <h3>Program 3</h3>
        </div>
        <div class="program-card">
            <h3>Program 4</h3>
        </div>
    </section>


</body>

</html>
