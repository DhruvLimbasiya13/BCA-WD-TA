<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1 class="text-center justify-content-center">Bento Grid Layout</h1>
    <div class="container mb-5 p-5" style="height: 88vh;">
        <div class="row h-75 mb-2">
            <div class="col-8 card bg-body-secondary me-2 text-center justify-content-center " >large item</div>
            <div class="col">
                <div class="row h-50 card bg-danger mb-1">small item</div>
                <div class="row h-50 card bg-warning  mt-1">small item</div>
            </div>
        </div>

        <div class="row h-25 ">
            <div class="col card bg-info me-2">medium item-1</div>
            <div class="col card bg-primary me-2">medium item-2</div>
            <div class="col card bg-success ">medium item-3</div>
        </div>
    </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
