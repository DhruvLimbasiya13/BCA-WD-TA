<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Bootstrap Unstyled List</title>
    <!-- Bootstrap CSS (v5 CDN example) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <ul class="list-unstyled">
        <li>First item</li>
        <li>Second item</li>
        <li>Third item
            <ul >
                <li class="list-group-item">Nested item one</li>
                <li class="list-group-item">Nested item two</li>
            </ul>
        </li>
        <li>Fourth item</li>
    </ul>

</body>

</html>
